<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EiJackGH | Experiments & Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 p-8">
    <div class="max-w-3xl mx-auto">
        <header class="border-b border-gray-700 pb-4 mb-8">
            <h1 class="text-3xl font-bold text-cyan-400">EiJackGH</h1>
            <p class="text-gray-400">Zero-asset experimental playground.</p>
        </header>

       <section class="mt-10">
    <h2 class="text-2xl font-bold text-cyan-400 mb-6">🔬 The Lab</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        
        <a href="/experiments/invaders/" class="border border-slate-700 p-4 rounded-lg hover:bg-slate-800 transition block">
            <h3 class="text-lg font-bold text-white">Space Invaders</h3>
            <p class="text-slate-400 text-sm">A canvas-based arcade experiment.</p>
            <span class="text-xs text-cyan-500 mt-2 block">Live Demo →</span>
        </a>

        </div>
</section>

        <section>
            <h2 class="text-xl font-semibold mb-4 text-emerald-400 underline">✍️ Latest Blog Posts</h2>
            <ul>
                {% for post in site.posts %}
                <li class="mb-2">
                    <span class="text-gray-500 text-sm">{{ post.date | date: "%b %d, %Y" }}</span>
                    <a href="{{ post.url }}" class="ml-2 text-blue-400 hover:text-white">{{ post.title }}</a>
                </li>
                {% endfor %}
            </ul>
        </section>
    </div>
</body>
</html>
